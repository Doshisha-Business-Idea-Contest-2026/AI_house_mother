name: 機能追加 (feat)
description: 新機能・機能改善の提案
title: "[feat] "
labels: ["type: feat"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を追加するか 1〜2 文で
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜ必要か。関連する docs/ のファイル名やユーザーストーリー番号を明記（ドキュメントファースト）
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: 満たすべき条件をチェックリストで
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: 対応する priority ラベルも忘れず付けてください
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 設計メモ・参考リンクなど（任意）
    validations:
      required: false
